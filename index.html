<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muhammad Abdullah | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background:#0a0a0a;
    color:#fff;
}

/* ===== HERO ===== */
.hero{
    position:relative;
    height:100vh;
    display:flex;
    align-items:center;
    padding:0 2rem;
    overflow:hidden;
}

.hero h1{
    font-size:3rem;
}

.hero p{
    margin-top:1rem;
    color:#aaa;
}

/* ===== FLOATING ICONS ===== */
.floating-icons{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:0;
}

.float-icon{
    position:absolute;
    width:60px;
    opacity:0.15;
    animation:float 6s ease-in-out infinite;
}

.float-icon svg{
    width:100%;
    height:100%;
}

/* Positions */
.icon1{top:15%;left:10%;animation-delay:0s;}
.icon2{top:70%;left:20%;animation-delay:1s;}
.icon3{top:25%;right:10%;animation-delay:2s;}
.icon4{top:75%;right:20%;animation-delay:3s;}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-25px);}
    100%{transform:translateY(0);}
}

/* Content above icons */
.hero-content{
    position:relative;
    z-index:2;
}

.highlight{
    color:#a855f7;
}
</style>
</head>

<body>

<section class="hero">

<!-- FLOATING ICONS -->
<div class="floating-icons">

<!-- FIGMA -->
<div class="float-icon icon1">
<svg viewBox="0 0 24 24"><path fill="#a855f7" d="M12 0a4 4 0 0 1 0 8H8a4 4 0 0 1 0-8h4zm0 8a4 4 0 1 1 0 8 4 4 0 0 1 0-8zm0 8a4 4 0 1 1-4 4 4 4 0 0 1 4-4zM8 8a4 4 0 1 1 0 8 4 4 0 0 1 0-8z"/></svg>
</div>

<!-- WEBFLOW -->
<div class="float-icon icon2">
<svg viewBox="0 0 24 24"><path fill="#a855f7" d="M24 4.5l-7.6 15H9.1l3.2-6.2h-.1C9.5 16.7 5.6 19 0 19.5v-6.1s3.6-.2 5.7-2.4H0V4.5h6.4v5.3h.1l2.6-5.3h4.8v5.2h.1l2.7-5.2H24z"/></svg>
</div>

<!-- JS -->
<div class="float-icon icon3">
<svg viewBox="0 0 24 24"><path fill="#a855f7" d="M0 0h24v24H0z"/></svg>
</div>

<!-- GSAP -->
<div class="float-icon icon4">
<svg viewBox="0 0 24 24"><path fill="#a855f7" d="M12 2L2 22h20L12 2z"/></svg>
</div>

</div>

<!-- HERO CONTENT -->
<div class="hero-content">
    <h1>Muhammad Abdullah <span class="highlight">Shahzad</span></h1>
    <p>Webflow Developer crafting modern high-performance websites.</p>
</div>

</section>

</body>
</html>
